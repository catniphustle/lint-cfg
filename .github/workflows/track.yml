name: KOL Follow Tracker

on:
  schedule:
    - cron: '*/15 * * * *'         # every 15 minutes
  workflow_dispatch:               # also lets you run it manually from the Actions tab

permissions:
  contents: write                  # needed so the job can commit state.json back

# Prevent overlapping runs (e.g., if a prior run is slow when a new one starts).
concurrency:
  group: kol-follow-tracker
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tracker.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update state $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase --autostash origin "$GITHUB_REF_NAME" || true
            git push
          fi
